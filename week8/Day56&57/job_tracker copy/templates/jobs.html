<!DOCTYPE html>
<html>
<head>
    <title>Jobs</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>💼 Job Listings</h1>

    {% for job in jobs %}
        <div class="job-card">
            <h3>{{ job.title }}</h3>
            <p><strong>Company:</strong> {{ job.company }}</p>
            <p><strong>Location:</strong> {{ job.location }}</p>
        </div>
    {% endfor %}

    <a href="/"><button>Back</button></a>
</div>

</body>
</html>
